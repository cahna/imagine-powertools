<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Imagine Power Tools</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Grok Imagine Power Tools</h1>
    <div class="mode-section">
      <span class="mode-label">Current Mode:</span>
      <span id="mode-badge" class="mode-badge">Loading...</span>
    </div>
    <p id="status" class="status"></p>

    <!-- Post mode UI -->
    <div id="post-ui" class="post-ui hidden">
      <form id="post-form" class="post-form">
        <textarea id="post-input" class="post-input" placeholder="Enter text..." rows="3"></textarea>
        <button type="submit" class="submit-btn">Submit</button>
      </form>
      <div class="history-section">
        <h2 class="history-title">History</h2>
        <ul id="history-list" class="history-list">
          <li class="history-empty">No entries yet</li>
        </ul>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
